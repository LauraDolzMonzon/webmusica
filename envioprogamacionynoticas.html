           <header>
              <h2>Envion progamacion y noticias</h2>
           </header>
           <main>
                <h3>noticias</h3>
                <form action="controlador.php" method="post">
                    <div class="grindclass2">  
                        <label for="noticainventario">Noticia:</label>

                        <input type="text" id="noticiainventario" name="noticiainventario" minlength="5" required>
                        <script>
                            const input6 = document.getElementById("noticiainventario");
                            input6.oninvalid = function () {
                                input6.setCustomValidity("Se reciere como mínimo 5 caracteres"); 

                            };
                            input6.oninput = function () {
                                input6.setCustomValidity("");
                            };
                        </script>
                        <label  for="Fechainventario">Fecha:</label> 
            
                        <input type="date" id="Fechainventario" name="Fechainventario" required>
                        <label  for="lugar">Lugar:</label> 
            
                        <input type="text" id="lugar" minlength="8" name="lugar" required>
                        <script>
                            const input7 = document.getElementById("lugar");
                            input7.oninvalid = function () {
                                input7.setCustomValidity("Se requiere como mínimo 8 caracteres");       
                            };
                            input7.oninput = function () {
                                input7.setCustomValidity("");
                            };
                        </script>
                        <label for="textoprogamacion">Texto:</label>
                        <textarea id="textoprogamacion" minlength="10" required></textarea>
                        <script>
                           const input8 = document.getElementById("textoprogamacion");
                           input8.oninvalid = function () {
                                input8.setCustomValidity("Se requiere como mínimo 8 caracteres");       
                           };
                            input8.oninput = function () {
                                input8.setCustomValidity("");
                          };
                      </script>
                        
                    </div><br>
                    <button class="botonparaenviar2" type="submit">Enviar</button>
                </form>
                <h3> progamacion</h3>
                <form action="controlador.php" methos="post">
                    <div class="grindclass4">  
                        <label for="nivel">Curso:</label>

                        <input type="text" id="nivel" name="nivel" required>

                        <label  for="Ano">Año:</label> 
            
                        <input type="text" id="ano" name="ano" pattern="^[0-9]{4}$"  maxlength="4" minlength="4" required>
                        <script>
                            const input10 = document.getElementById("ano");
                            input10.oninvalid = function () {
                                input10.setCustomValidity("Tiene que tener 4 caracteres y solo numeros");       
                            };
                            input10.oninput = function () {
                                input10.setCustomValidity("");
                            };
                        </script>
                        <label  for="profesor">Profesor:</label> 
            
                        <input type="text" id="profesor" name="profesor" pattern="^[A-Za-zñÑ]+$" minlength="3" required>
                           <script>
                            const inputprofesor = document.getElementById("profesor");
                            inputprofesor.oninvalid = function () {
                                inputprofesor.setCustomValidity("solo debe tener letras y más de 3 letras");       
                            };
                            inputprofesor.oninput = function () {
                                inputprofesor.setCustomValidity("");
                            };
                        </script>
                        <label for="achivo">sube el archivo</label>
                        <input type="file" id="achivo" accept=".pdf" required>    
                           <script>
                            const inputachivo = document.getElementById("achivo");
                            inputachivo.oninvalid = function () {
                                inputachivo.setCustomValidity("Solo permite pdf");       
                            };
                            inputachivo.oninput = function () {
                                inputachivo.setCustomValidity("");
                            };
                        </script>                    
                </div><br>
                    <button class="botonparaenviar2" type="submit">Enviar</button>
               </form>
            </main>
